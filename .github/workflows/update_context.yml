name: Update CONTEXT.md

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "remotion/**"
      - "config/**"
      - "pyproject.toml"
      - ".github/scripts/**"

permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate CONTEXT.md
        run: python .github/scripts/generate_context.py

      - name: Commit and push CONTEXT.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTEXT.md
          git diff --cached --quiet || git commit -m "chore: update CONTEXT.md [skip ci]"
          git push
